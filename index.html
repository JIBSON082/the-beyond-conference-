<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The Beyond Conference 2026 — MORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600;1,700&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
:root{
  --bg-void:#0C1628; --bg-deep:#111E35; --bg-navy:#172540;
  --bg-card:rgba(22,38,70,0.92);
  --gold:#D4A82A; --gold-light:#F2C84B;
  --gold-pale:rgba(212,168,42,0.16); --gold-border:rgba(212,168,42,0.4);
  --text-bright:#FFFFFF; --text-mid:#DDEAF8; --text-dim:#92B4CE; --text-muted:#4E6880;
  --line:rgba(212,168,42,0.28); --white-line:rgba(255,255,255,0.12);
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'Outfit',system-ui,sans-serif;
  --max-w:1200px; --side-pad:clamp(20px,5vw,80px); --section-pad:clamp(80px,10vw,140px);
  --ease-out:cubic-bezier(0.16,1,0.3,1); --ease-io:cubic-bezier(0.76,0,0.24,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{background:var(--bg-void);color:var(--text-bright);font-family:var(--font-body);font-weight:300;line-height:1.7;overflow-x:hidden}
img{display:block;max-width:100%}
button{cursor:pointer;font-family:inherit;border:none;background:none}
a{text-decoration:none;color:inherit}
ul{list-style:none}
::selection{background:var(--gold);color:var(--bg-void)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg-void)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg-void);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}
.loader-logo{width:64px;height:64px;border-radius:10px;overflow:hidden;animation:lP 1.5s ease-in-out infinite}
.loader-logo img{width:100%;height:100%;object-fit:cover}
@keyframes lP{0%,100%{opacity:0.5;transform:scale(0.95)}50%{opacity:1;transform:scale(1)}}
.loader-track{width:120px;height:1px;background:var(--white-line);overflow:hidden;position:relative}
.loader-track::after{content:'';position:absolute;inset:0;background:var(--gold);animation:sw 1.2s var(--ease-io) infinite}
@keyframes sw{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:16px var(--side-pad);transition:background 0.4s var(--ease-out),padding 0.4s}
.navbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(212,168,42,0.4),rgba(255,255,255,0.14),rgba(212,168,42,0.4),transparent);pointer-events:none}
.navbar.scrolled{background:rgba(10,18,38,0.96);backdrop-filter:blur(24px);padding:12px var(--side-pad)}
.navbar.scrolled::after{background:linear-gradient(to right,transparent,rgba(212,168,42,0.6),transparent)}

/* Logo + IG grouped */
.nav-left{display:flex;align-items:center;gap:14px;flex-shrink:0}
.nav-logo-btn{width:44px;height:44px;border-radius:8px;overflow:hidden;border:none;padding:0;display:block;transition:transform 0.3s var(--ease-out)}
.nav-logo-btn:hover{transform:scale(1.06)}
.nav-logo-btn img{width:100%;height:100%;object-fit:cover}

/* Instagram icon */
.nav-ig{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid var(--white-line);border-radius:6px;color:var(--text-dim);transition:color 0.3s,border-color 0.3s,background 0.3s,transform 0.3s var(--ease-out)}
.nav-ig:hover{color:var(--gold-light);border-color:var(--gold-border);background:var(--gold-pale);transform:scale(1.08)}
.nav-ig svg{width:18px;height:18px}

.hamburger{display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:6px;width:44px;height:44px;padding:0;z-index:1100;position:relative}
.hamburger span{display:block;height:1.5px;background:var(--text-bright);border-radius:2px;transition:transform 0.45s var(--ease-io),width 0.35s var(--ease-out),opacity 0.3s;transform-origin:right center}
.hamburger span:nth-child(1){width:28px}.hamburger span:nth-child(2){width:20px}.hamburger span:nth-child(3){width:14px}
.hamburger:hover span{background:var(--gold-light)}
.hamburger.active span:nth-child(1){width:26px;transform:rotate(-45deg) translate(3px,4px)}
.hamburger.active span:nth-child(2){width:0;opacity:0}
.hamburger.active span:nth-child(3){width:26px;transform:rotate(45deg) translate(3px,-4px)}
.nav-overlay{position:fixed;inset:0;z-index:900;background:var(--bg-deep);display:flex;align-items:center;justify-content:center;clip-path:circle(0% at 95% 5%);overflow:hidden}
.nav-overlay::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 80%,rgba(212,168,42,0.09) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 20%,rgba(126,200,227,0.06) 0%,transparent 60%)}
.nav-links{display:flex;flex-direction:column;align-items:center;gap:clamp(20px,3vh,36px);position:relative;z-index:1}
.nav-link{font-family:var(--font-display);font-size:clamp(2rem,5vw,4rem);font-weight:400;color:var(--text-mid);letter-spacing:0.02em;transition:color 0.3s,transform 0.3s var(--ease-out);position:relative;padding:4px 0;background:none;border:none;cursor:pointer}
.nav-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width 0.4s var(--ease-out)}
.nav-link:hover{color:var(--gold-light);transform:translateX(8px)}
.nav-link:hover::after{width:100%}

/* HERO */
.hero{position:relative;min-height:100svh;display:flex;align-items:flex-end;overflow:hidden}
.hero-img{position:absolute;inset:0;background-size:cover;background-position:center center;will-change:transform}
/* Very light overlay — image clearly visible */
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,18,38,0.16) 0%,rgba(10,18,38,0.06) 25%,rgba(10,18,38,0.36) 60%,rgba(10,18,38,0.97) 100%);z-index:1}
.hero-content{position:relative;z-index:2;padding:clamp(100px,15vh,160px) var(--side-pad) var(--section-pad);max-width:var(--max-w);width:100%;margin:0 auto}
.hero-eyebrow{font-size:clamp(0.62rem,1.5vw,0.78rem);font-weight:500;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;display:flex;align-items:center;gap:16px}
.hero-eyebrow::before{content:'';display:block;width:40px;height:1px;background:var(--gold)}
.hero-title{font-family:var(--font-display);font-size:clamp(3.5rem,9vw,8.5rem);font-weight:300;line-height:0.95;letter-spacing:-0.02em;color:#fff;margin-bottom:16px;display:flex;flex-wrap:wrap;align-items:baseline;gap:0}
.hero-year{display:block;font-style:italic;font-weight:300;color:var(--gold-light);font-size:0.75em;letter-spacing:0.04em;width:100%}
.hero-details{display:flex;flex-wrap:wrap;align-items:flex-start;margin-top:clamp(28px,4vh,48px);border-top:1px solid var(--line);padding-top:28px}
.detail-item{display:flex;flex-direction:column;gap:4px;padding:12px 24px 12px 0}
.detail-div{width:1px;height:48px;background:var(--line);align-self:center;margin:0 20px 0 0;flex-shrink:0}
.detail-label{font-size:0.62rem;font-weight:500;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold)}
.detail-value{font-family:var(--font-display);font-size:clamp(0.9rem,1.8vw,1.1rem);font-weight:400;color:#fff}
.detail-value em{font-style:italic;color:var(--gold-light)}
.scroll-cue{position:absolute;bottom:40px;right:var(--side-pad);display:flex;flex-direction:column;align-items:center;gap:10px;z-index:2}
.scroll-cue span{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-dim);writing-mode:vertical-rl}
.scroll-line{width:1px;height:50px;background:linear-gradient(to bottom,var(--gold),transparent);animation:sP 2s ease-in-out infinite}
@keyframes sP{0%,100%{opacity:0.4}50%{opacity:1}}

/* ---- GLOBE O ---- */
.globe-o-wrap{display:inline-block;position:relative;vertical-align:baseline;line-height:inherit}
.globe-o-wrap svg{display:inline-block;vertical-align:baseline;width:0.78em;height:0.78em;position:relative;top:0.05em;overflow:visible}
/* Meridian spin — scaleX creates the longitude rotation illusion */
#meridian-grp{transform-origin:50px 50px;animation:mSpin 2.5s ease-in-out infinite alternate}
@keyframes mSpin{0%{transform:scaleX(1)}50%{transform:scaleX(0)}100%{transform:scaleX(-1)}}
/* Subtle whole-globe slow rotation */
.globe-o-wrap svg{animation:globeRot 20s linear infinite;transform-origin:center}
@keyframes globeRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
/* Glow pulse */
#g-glow{animation:glowP 2.5s ease-in-out infinite;transform-origin:50px 50px}
@keyframes glowP{0%,100%{opacity:0.15;transform:scale(0.9)}50%{opacity:0.55;transform:scale(1.1)}}

/* GOLD LINE */
.gold-line{height:1px;background:linear-gradient(to right,transparent,var(--gold-border),transparent)}

/* SHARED */
.section-wrap{max-width:var(--max-w);margin:0 auto;padding:var(--section-pad) var(--side-pad)}
.section-label{font-size:0.62rem;font-weight:500;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;display:flex;align-items:center;gap:14px}
.section-label::after{content:'';flex:1;max-width:80px;height:1px;background:var(--line)}
.section-heading{font-family:var(--font-display);font-size:clamp(3rem,7vw,6.5rem);font-weight:300;line-height:0.95;letter-spacing:-0.02em;color:var(--text-bright);margin-bottom:clamp(40px,6vh,72px)}
.section-heading em{font-style:italic;color:var(--gold-light)}

/* VISION */
.vision{background:var(--bg-deep);position:relative;overflow:hidden}
.vision::before{content:'MORE';position:absolute;top:50%;right:-4vw;transform:translateY(-50%);font-family:var(--font-display);font-size:clamp(14vw,22vw,280px);font-weight:700;font-style:italic;color:transparent;-webkit-text-stroke:1px rgba(212,168,42,0.1);user-select:none;pointer-events:none;letter-spacing:-0.04em;line-height:1;z-index:0}
.vision .section-wrap{position:relative;z-index:1}
.vision-intro{max-width:680px;margin-bottom:clamp(48px,7vh,80px)}
.vision-intro p{font-size:clamp(1rem,1.8vw,1.15rem);color:var(--text-mid);line-height:1.85;margin-bottom:20px}
.pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:2px;margin-bottom:clamp(48px,7vh,80px)}
.pillar{background:var(--bg-card);border:1px solid var(--white-line);padding:clamp(24px,4vw,40px);position:relative;overflow:hidden;transition:border-color 0.4s,background 0.4s}
.pillar::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--gold-pale),transparent);opacity:0;transition:opacity 0.4s}
.pillar:hover{border-color:var(--gold-border)}.pillar:hover::before{opacity:1}
.pillar-num{display:block;font-family:var(--font-display);font-size:3.5rem;font-weight:300;color:rgba(255,255,255,0.12);line-height:1;margin-bottom:20px;transition:color 0.4s}
.pillar:hover .pillar-num{color:var(--gold-border)}
.pillar p{font-family:var(--font-display);font-size:clamp(1.1rem,2vw,1.4rem);font-weight:400;color:var(--text-bright);line-height:1.55;position:relative;z-index:1}
.pillar p strong{font-weight:600;color:var(--gold-light)}
.vision-closing{font-size:clamp(1rem,1.9vw,1.2rem);color:var(--text-mid);max-width:720px;line-height:1.85;border-left:2px solid var(--gold);padding-left:28px}

/* PARTNERSHIPS */
.partnerships{background:var(--bg-navy);position:relative;overflow:hidden}
.partnerships::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--gold-border),transparent)}
.partners-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(40px,6vw,80px);align-items:start}
@media(max-width:768px){.partners-grid{grid-template-columns:1fr}}
.col-heading{font-size:0.62rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.support-list{display:flex;flex-direction:column}
.support-item{font-family:var(--font-display);font-size:clamp(1.1rem,2.2vw,1.45rem);font-weight:400;color:var(--text-mid);padding:18px 0;border-bottom:1px solid var(--white-line);display:flex;align-items:center;gap:16px;transition:color 0.3s,padding-left 0.3s var(--ease-out);cursor:default}
.support-item::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;transition:transform 0.3s}
.support-item:hover{color:var(--text-bright);padding-left:8px}.support-item:hover::before{transform:scale(1.5)}
.progress-amounts{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.amt-raised{font-family:var(--font-display);font-size:clamp(2rem,4vw,3rem);font-weight:500;color:var(--gold-light);letter-spacing:-0.02em}
.amt-total{font-size:0.85rem;color:var(--text-dim);letter-spacing:0.05em}
.progress-track{height:3px;background:var(--white-line);border-radius:2px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold-light));border-radius:2px;position:relative;width:0%}
.progress-fill::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:var(--gold-light);box-shadow:0 0 10px rgba(242,200,75,0.7)}
.progress-pct{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:32px}
.account-card{background:var(--bg-card);border:1px solid var(--gold-border);padding:clamp(20px,3vw,32px);position:relative;overflow:hidden}
.account-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--gold),var(--gold-light),var(--gold))}
.account-label{font-size:0.62rem;font-weight:500;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.account-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--white-line);cursor:pointer;gap:12px;transition:background 0.2s,margin 0.2s,padding 0.2s}
.account-row:last-child{border-bottom:none}
.account-row:hover{margin:0 -24px;padding:14px 24px;background:rgba(212,168,42,0.07)}
.acct-field{font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);flex-shrink:0;min-width:120px}
.acct-val{font-family:var(--font-display);font-size:clamp(1rem,1.8vw,1.15rem);color:var(--text-bright);font-weight:500;flex:1}
.copy-btn{font-size:0.62rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);padding:5px 12px;border:1px solid var(--gold-border);transition:background 0.25s,color 0.25s;flex-shrink:0}
.account-row:hover .copy-btn{background:var(--gold);color:var(--bg-void)}
.cflash{color:var(--gold-light)!important;border-color:var(--gold-light)!important}

/* VOLUNTEERS */
.volunteers{background:var(--bg-deep);position:relative}
.vol-intro{max-width:600px;font-size:clamp(1rem,1.7vw,1.1rem);color:var(--text-mid);line-height:1.85;margin-bottom:clamp(48px,7vh,80px);margin-top:-24px}
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px}
.unit-card{background:var(--bg-card);border:1px solid var(--white-line);padding:clamp(28px,4vw,44px);display:flex;flex-direction:column;gap:16px;position:relative;overflow:hidden;transition:border-color 0.4s,transform 0.4s var(--ease-out)}
.unit-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--gold),var(--gold-light));transform:scaleX(0);transform-origin:left;transition:transform 0.4s var(--ease-out)}
.unit-card:hover{border-color:var(--gold-border);transform:translateY(-4px)}.unit-card:hover::after{transform:scaleX(1)}
.unit-num{font-family:var(--font-display);font-size:4rem;font-weight:300;color:rgba(255,255,255,0.1);line-height:1;transition:color 0.4s}
.unit-card:hover .unit-num{color:var(--gold-border)}
.unit-name{font-family:var(--font-display);font-size:clamp(1.3rem,2.2vw,1.6rem);font-weight:500;color:var(--text-bright);line-height:1.25}
.unit-desc{font-size:0.88rem;color:var(--text-dim);line-height:1.7;flex:1}
.join-btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;background:transparent;border:1px solid var(--gold-border);color:var(--gold);font-size:0.7rem;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;transition:background 0.3s,color 0.3s,border-color 0.3s,transform 0.3s var(--ease-out);align-self:flex-start;margin-top:8px}
.join-btn:hover{background:var(--gold);color:var(--bg-void);border-color:var(--gold);transform:translateY(-2px)}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(5,12,28,0.9);backdrop-filter:blur(12px);z-index:2000;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-backdrop{align-items:center;padding:20px}}
.modal{background:var(--bg-navy);border:1px solid var(--gold-border);border-bottom:none;width:100%;max-width:560px;max-height:90svh;overflow-y:auto;padding:clamp(28px,4vw,48px);position:relative;transform:translateY(80px);opacity:0;transition:transform 0.5s var(--ease-out),opacity 0.5s var(--ease-out)}
.modal.open{transform:translateY(0);opacity:1}
@media(min-width:640px){.modal{border-bottom:1px solid var(--gold-border)}}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--gold),var(--gold-light),var(--gold),transparent)}
.modal-close{position:absolute;top:20px;right:24px;font-size:0.62rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);padding:6px 12px;border:1px solid var(--white-line);transition:color 0.25s,border-color 0.25s}
.modal-close:hover{color:var(--text-bright);border-color:var(--text-mid)}
.modal-header{margin-bottom:32px}
.modal-unit-label{font-size:0.62rem;font-weight:500;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.modal-title{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.5rem);font-weight:400;color:var(--text-bright);line-height:1.1}
.form-body{display:flex;flex-direction:column;gap:20px}
.form-field{display:flex;flex-direction:column;gap:8px}
.form-field label{font-size:0.66rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim)}
.form-field input{background:rgba(255,255,255,0.05);border:1px solid var(--white-line);padding:14px 16px;color:var(--text-bright);font-size:0.95rem;font-weight:300;outline:none;transition:border-color 0.25s,background 0.25s;width:100%;font-family:var(--font-body)}
.form-field input::placeholder{color:var(--text-muted)}
.form-field input:focus{border-color:var(--gold-border);background:rgba(212,168,42,0.05)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}
.radio-group{display:flex;gap:10px}
.radio-opt{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 10px;border:1px solid var(--white-line);cursor:pointer;font-size:0.85rem;color:var(--text-dim);transition:border-color 0.25s,color 0.25s,background 0.25s;text-align:center;user-select:none}
.radio-opt.selected{border-color:var(--gold);background:var(--gold-pale);color:var(--gold-light)}
.radio-opt:hover:not(.selected){border-color:var(--gold-border);color:var(--text-mid)}
.err-msg{font-size:0.82rem;color:#F07070;padding:10px 14px;border:1px solid rgba(240,112,112,0.3);background:rgba(240,112,112,0.07)}
.confirm-btn{padding:16px 32px;backgrou
